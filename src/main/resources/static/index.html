<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Gestão de Tarefas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="page">
    <header class="topbar">
        <div class="brand">
            <span class="brand-dot"></span>
            <h1>TASKFLOW</h1>
        </div>
        <div class="api-badge">localhost:8080/tarefas</div>
    </header>

    <main class="container">
        <section class="hero">
            <h2>Gestão de <span>Tarefas</span></h2>
            <p>Uma interface simples para cadastrar, visualizar e gerenciar tarefas da API.</p>
        </section>

        <section class="card">
            <h3>Nova Tarefa</h3>

            <form id="tarefaForm" class="task-form">
                <div class="form-group">
                    <label for="titulo">Título</label>
                    <input type="text" id="titulo" placeholder="Ex: Estudar Docker" required>
                </div>

                <div class="form-group">
                    <label for="descricao">Descrição</label>
                    <input type="text" id="descricao" placeholder="Ex: Revisar Dockerfile e Compose" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">+ Adicionar</button>
                </div>
            </form>
        </section>

        <section class="card">
            <div class="section-header">
                <div>
                    <h3>Lista de Tarefas</h3>
                    <p id="contadorTarefas">0 tarefas cadastradas</p>
                </div>

                <input
                        type="text"
                        id="filtro"
                        class="filter-input"
                        placeholder="Filtrar por título..."
                >
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Título</th>
                        <th>Descrição</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                    </thead>
                    <tbody id="listaTarefas">
                    <!-- preenchido via JS -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>

<script src="app.js"></script>
</body>
</html>
